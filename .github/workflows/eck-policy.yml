name: ECK Policy Enforcement

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint-eck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ansible-lint

      - name: Run ansible-lint (ECK policies)
        run: |
          ansible-lint -c .ansible-lint
